# KeInFS observability stack: Prometheus + Grafana, pre-provisioned with the
# datasource and the enterprise dashboards. Run on a dedicated observability box
# that can reach every node's keinexport sidecar (:9909).
#
#   docker compose -f observability/docker-compose.yml up -d
#
# Grafana: http://<box>:3000  (default admin/admin on first login — change it).
# Prometheus: http://<box>:9090
#
# Edit observability/prometheus/prometheus.yml to point at your nodes' :9909.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: keinfs-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: keinfs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5s
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
